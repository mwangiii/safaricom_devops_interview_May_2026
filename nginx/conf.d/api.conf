# ─── Upstream Flask API cluster ──────────────────────────────────────────────
upstream flask_api {
    server api:5000;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow health-check on port 80 without redirect (for load balancer probes)
    location /health {
        proxy_pass         http://flask_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        access_log         off;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS configuration ──────────────────────────────────────────────────
    # Replace with real cert paths from your PKI / Let's Encrypt
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── Fallback self-signed (development/staging only) ────────────────────
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"                   always;
    add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none';"  always;

    # ── Proxy settings ─────────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection      "";
    proxy_set_header        Host            $host;
    proxy_set_header        X-Real-IP       $remote_addr;
    proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto https;
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;
    proxy_buffer_size       4k;
    proxy_buffers           4 32k;

    # ── Auth endpoints (tighter rate limit) ────────────────────────────────
    location ~ ^/api/auth/(register|login) {
        limit_req   zone=auth_limit  burst=5  nodelay;
        limit_req_status 429;

        proxy_pass  http://flask_api;
    }

    # ── General API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req   zone=api_limit  burst=20  nodelay;
        limit_req_status 429;

        proxy_pass  http://flask_api;
    }

    # ── Health check (no rate limit, no logging) ───────────────────────────
    location /health {
        proxy_pass  http://flask_api;
        access_log  off;
    }

    # ── Deny everything else ───────────────────────────────────────────────
    location / {
        return 404;
    }

    # ── Disallow hidden files ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}